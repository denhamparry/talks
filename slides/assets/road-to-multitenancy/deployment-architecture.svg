<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="sans-serif">
  <!-- Background -->
  <rect width="1200" height="580" fill="#d0fdf2"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#013a3b">
