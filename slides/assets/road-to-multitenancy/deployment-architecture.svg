  </text>

  <!-- ── Layer 1: External Traffic (top) ── -->
  <rect x="380" y="55" width="440" height="50" rx="8" fill="#013a3b"/>
  <text x="600" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#d0fdf2">
